name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Spec gate: the OpenSpec baseline and all in-flight changes must validate.
  openspec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g @fission-ai/openspec@latest
      - run: openspec validate --all --strict

  # Build + test gate: CPU-only build (all backend flags OFF) against the pinned
  # NumPP dependency, run against the frozen tests/golden data (no Python needed).
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake g++ ninja-build
      - name: Fetch pinned NumPP
        run: git clone --depth 1 https://github.com/CyberdyneCorp/NumPP.git "${{ github.workspace }}/../NumPP"
      - name: Bootstrap NumPP (find_package prefix)
        run: scripts/bootstrap_numpp.sh "${{ github.workspace }}/../NumPP"
      - name: Configure (CPU-only)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build -j"$(nproc)"
      - name: Test
        run: ctest --test-dir build --output-on-failure
